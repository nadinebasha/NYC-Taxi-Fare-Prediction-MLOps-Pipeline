data:
  raw_path: data/raw/yellow_tripdata_2015-01.csv
  processed_path: data/processed/cleaned.csv
  split_path: data/splits/
  preprocessor_path: data/processed/preprocessor.pkl
  
target: total_amount

split:
  test_size: 0.2
  random_state: 42

features:
  numeric:
    - passenger_count
    - trip_distance
    - fare_amount
    - tip_amount
    - tolls_amount

  categorical:
  - VendorID
  - payment_type

selection:
  k_best: 8

preprocess:
  numeric_imputer_strategy: median
  categorical_imputer_strategy: most_frequent
  onehot_handle_unknown: ignore

mlflow:
  tracking_uri: "http://localhost:5000"
  experiment_name: "NYC_Taxi_Experiment"

evaluate:
  rmse_threshold: 20.0

serving:
  host: 127.0.0.1
  port: 8000

monitoring:
  drift_threshold: 0.2